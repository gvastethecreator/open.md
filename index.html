<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/favicon.svg" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenMD</title>
    <script type="module" src="/src/main.js" defer></script>
  </head>

  <body>
    <div class="app-shell">
      <main class="viewport">
        <section id="empty-stage" class="empty-stage" aria-live="polite">
          <div class="empty-card" id="empty-open-area" style="cursor: pointer;" title="Abrir archivo">
            <img class="empty-logo" src="/src/assets/favicon.svg" alt="OpenMD" />
            <h1>Open file</h1>
          </div>
        </section>

        <section id="help-stage" class="help-stage hidden" aria-labelledby="help-title">
          <div class="help-card minimal-help">
            <h1 id="help-title">Guía rápida</h1>
            <ul class="help-list">
              <li><kbd>F1</kbd>: Abrir/cerrar ayuda</li>
              <li><kbd>T</kbd>: Siguiente tema</li>
              <li><kbd>Ctrl</kbd> + <kbd>T</kbd>: Tema anterior</li>
              <li><kbd>Ctrl</kbd> + <kbd>+</kbd>/<kbd>-</kbd>: Zoom</li>
              <li>Arraste un archivo o haga clic para abrir</li>
            </ul>
          </div>
        </section>

        <article id="content" class="markdown-body hidden" aria-live="polite"></article>
      </main>
      
      <button id="scroll-to-top" class="scroll-to-top" aria-label="Volver arriba">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
      </button>
    </div>

    <div id="drop-indicator" class="drop-indicator" aria-hidden="true">
      <div class="drop-indicator__box">Suelta tus archivos <code>.md</code>, <code>.markdown</code> o <code>.txt</code></div>
    </div>
  </body>
</html>
